<!DOCTYPE html>
<html lang="pt-AO">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description"
    content="FACIL - A plataforma mais segura para comprar, alugar e vender imóveis e viaturas em Angola com verificação de identidade.">
  <title>FACIL - Arrendamento e Venda em Angola</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'brand-navy': '#0F1D23',
            'brand-navy-light': '#1A2D35',
            'brand-gold': '#C6A75E',
            'brand-gold-dark': '#A68B4C',
            'brand-gray': '#767676',
            'brand-beige': '#F5F5F5',
            'primary-dark': '#091317',
            'accent-pink': '#C6A75E',
            'neutral-bg': '#0F1D23'
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            display: ['Playfair Display', 'serif']
          },
          borderRadius: {
            '4xl': '2rem',
            '5xl': '3rem'
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    body {
      font-family: 'Inter', system-ui, sans-serif;
      color: #FFFFFF;
      background-color: #041E26;
      margin: 0;
    }

    /* Custom scrollbar for glass aesthetic */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #041E26;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #E1C0D2;
    }

    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .leaflet-container {
      width: 100%;
      height: 100%;
      z-index: 1;
    }
  </style>
</head>

<body class="bg-neutral-bg text-white antialiased">
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
